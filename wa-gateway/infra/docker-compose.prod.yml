version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./certs:/etc/nginx/certs:ro  # TLS certs
    depends_on:
      - api
    restart: always
    networks:
      - wa-net

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: ../.env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - wa-net

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file: ../.env
    environment:
      NODE_ENV: production
      SESSIONS_DIR: /app/sessions
      METRICS_PORT: "9090"
    volumes:
      - sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 8G  # ~80 instances × 80MB + overhead
    networks:
      - wa-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wagateway
      POSTGRES_USER: wagateway
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - wa-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - wa-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - miniodata:/data
    restart: always
    networks:
      - wa-net

  # Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9091:9090"
    restart: always
    networks:
      - wa-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafanadata:/var/lib/grafana
    restart: always
    networks:
      - wa-net

volumes:
  pgdata:
  redisdata:
  sessions:
  miniodata:
  prometheusdata:
  grafanadata:

networks:
  wa-net:
    driver: bridge
