version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3100:3100"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wa-net

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file: ../.env
    volumes:
      - sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wa-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wagateway
      POSTGRES_USER: wagateway
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wagateway_secret}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wagateway"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wa-net

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wa-net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - wa-net

volumes:
  pgdata:
  redisdata:
  sessions:
  miniodata:

networks:
  wa-net:
    driver: bridge
