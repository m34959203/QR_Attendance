global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'wa-gateway-api'
    static_configs:
      - targets: ['api:3100']
    metrics_path: '/metrics'

  - job_name: 'wa-gateway-worker'
    static_configs:
      - targets: ['worker:9090']
    metrics_path: '/metrics'
